<section class="min-h-[500px] my-8 flex items-center justify-center">
  <div class="w-full max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-2xl text-center font-bold mb-2">تسجيل الدخول</h1>
    <p class="text-center text-gray-600 mb-6">أهلاً بك مجدداً في مدوّنتي</p>
    <form class="" [formGroup]="loginForm" (ngSubmit)="submit()">
      <div class="mb-4">
        <label for="email" class="block text-gray-700 mb-2"
          >البريد الإلكتروني</label
        >
        <input
          type="email"
          id="email"
          name="email"
          formControlName="email"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring focus:border-blue-300"
        />
        <small
          class="text-red-500"
          *ngIf="
            loginForm.get('email')?.invalid && loginForm.get('email')?.touched
          "
        >
          Email is required and must be a valid email address.
        </small>
      </div>
      <div class="mb-6">
        <label for="password" class="block text-gray-700 mb-2"
          >كلمة المرور</label
        >
        <input
          type="password"
          id="password"
          name="password"
          formControlName="password"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring focus:border-blue-300"
        />
        <small
          class="text-red-500"
          *ngIf="
            loginForm.get('password')?.invalid && loginForm.get('password')?.touched
          "
        >
          Password is required and must be at least 6 characters long.
        </small>
      </div>
      <button
        type="submit"
        class="w-full bg-primary text-white py-2 rounded-lg"
      >
        تسجيل الدخول
      </button>
    </form>
    <p class="text-center text-gray-600 mt-4">
      ليس لديك حساب؟
      <button routerLink="/register" class="text-primary font-semibold">
        سجّل الآن
      </button>
    </p>
  </div>
</section>
