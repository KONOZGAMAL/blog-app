 @if (article) {
  <div class="max-w-3xl mx-auto px-4 py-10">

    <div class="flex items-center justify-between mb-8">
      <button
        (click)="goBack()"
        class="flex items-center gap-2 text-primary hover:underline"
      >
        <i class="ti ti-arrow-right"></i>
        <span>العودة للرئيسية</span>
      </button>

      @if (isOwner) {
        <div class="flex items-center gap-2">
          <button
            (click)="editArticle()"
            class="flex items-center gap-1.5 text-sm text-gray-500 border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-gray-50 transition-all"
          >
            <i class="ti ti-edit"></i>
            <span>تعديل</span>
          </button>
          <button
            (click)="deleteArticle()"
            class="flex items-center gap-1.5 text-sm text-white bg-red-500 px-3 py-1.5 rounded-lg hover:bg-red-600 transition-all"
          >
            <i class="ti ti-trash"></i>
            <span>حذف</span>
          </button>
        </div>
      }
    </div>

    <span class="text-sm font-semibold text-primary bg-primary/10 px-3 py-1 rounded-full">
      {{ article.category }}
    </span>

    <h1 class="text-3xl font-bold mt-4 mb-3 leading-snug">{{ article.title }}</h1>

    <div class="flex items-center gap-4 text-gray-400 text-sm mb-6">
      <div class="flex items-center gap-1">
        <i class="ti ti-clock"></i>
        <span>{{ article.readTime }} للقراءة</span>
      </div>
      @if (article.author) {
        <div class="flex items-center gap-1">
          <i class="ti ti-user"></i>
          <span>{{ article.author }}</span>
        </div>
      }
    </div>

    <img
      [src]="article.image"
      [alt]="article.title"
      class="w-full rounded-2xl mb-8 object-cover max-h-80"
    />

    <p class="text-gray-600 text-lg leading-relaxed mb-8">{{ article.description }}</p>

    <div class="bg-white rounded-2xl p-6 text-gray-800 leading-loose whitespace-pre-line">
      {{ article.content }}
    </div>

  </div>
} @else {
  <div class="flex flex-col items-center justify-center py-32 text-gray-400">
    <i class="ti ti-file-off text-6xl mb-4"></i>
    <p class="text-xl">المقال غير موجود</p>
    <button
      (click)="goBack()"
      class="mt-6 text-primary hover:underline"
    >
      العودة للرئيسية
    </button>
  </div>
}
