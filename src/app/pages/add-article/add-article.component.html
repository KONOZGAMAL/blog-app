<section class="bg-white p-6 my-8 rounded shadow-md max-w-2xl mx-auto mt-10">
  <h1 class="text-2xl font-bold mb-4">إضافة مقال</h1>

  <form
    class="flex flex-col gap-4"
    [formGroup]="articleForm"
    (ngSubmit)="submitArticle()"
  >
    <select class="w-full border p-2 rounded" [formControlName]="'category'">
      <option value="">اختار الفئة</option>
      <option *ngFor="let cat of categories" [value]="cat">
        {{ cat }}
      </option>
    </select>

    <div class="flex flex-col gap-1">
      <input
        type="text"
        placeholder="العنوان"
        class="w-full border p-2 rounded"
        [formControlName]="'title'"
      />
      <span
        *ngIf="
          articleForm.get('title')?.invalid && articleForm.get('title')?.touched
        "
        class="text-sm text-red-500"
      >
        العنوان مطلوب.
      </span>
    </div>

    <div class="flex flex-col gap-1">
      <input
        type="text"
        formControlName="imageUrl"
        placeholder="ضع رابط الصورة المباشر (.jpg أو .png)"
        class="w-full border p-2 rounded"
      />
      <span
        *ngIf="
          articleForm.get('imageUrl')?.invalid &&
          articleForm.get('imageUrl')?.touched
        "
        class="text-sm text-red-500"
      >
        تأكد أن الرابط ينتهي بـ .jpg أو .jpeg أو .png وأنه رابط مباشر للصورة.
      </span>
    </div>

    <div class="flex flex-col gap-1">
      <input
        type="text"
        placeholder="وقت القراءة (e.g. 5 min)"
        class="w-full border p-2 rounded"
        [formControlName]="'readTime'"
      />
      <span
        *ngIf="
          articleForm.get('readTime')?.invalid &&
          articleForm.get('readTime')?.touched
        "
        class="text-sm text-red-500"
      >
        وقت القراءة مطلوب.
      </span>
    </div>
    <div class="flex flex-col gap-1">
      <textarea
        placeholder="الوصف"
        class="w-full border p-2 rounded"
        [formControlName]="'description'"
      ></textarea>
      <span
        *ngIf="
          articleForm.get('description')?.invalid &&
          articleForm.get('description')?.touched
        "
        class="text-sm text-red-500"
      >
        الوصف مطلوب.
      </span>
    </div>

    <div class="flex flex-col gap-1">
      <textarea
        placeholder="المحتوى الكامل للمقال"
        rows="6"
        class="w-full border p-2 rounded"
        [formControlName]="'content'"
      ></textarea>
      <span
        *ngIf="
          articleForm.get('content')?.invalid &&
          articleForm.get('content')?.touched
        "
        class="text-sm text-red-500"
      >
        المحتوى مطلوب.
      </span>
    </div>

    <button type="submit" class="bg-primary text-white px-4 py-2 rounded">
      إرسال
    </button>
  </form>
</section>
