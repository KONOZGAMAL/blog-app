
<section class="bg-white p-6 rounded shadow-md max-w-2xl mx-auto mt-10">
  <h1 class="text-2xl font-bold mb-4">إضافة مقال</h1>

  <form class="space-y-4">

    <select  class="w-full border p-2 rounded">
      <option value="">اختار الفئة</option>
      <!-- <option *ngFor="let cat of categories" [value]="cat">
        {{ cat }}
      </option> -->
    </select>

    <div>
     <label class="block mb-1 font-medium">العنوان</label>
      <input
      type="text"
      placeholder="Title"
      class="w-full border p-2 rounded"
      />
    </div>

    <div>
      <label class="block mb-1 font-medium">الوصف</label>
      <textarea
        placeholder="Description"
        class="w-full border p-2 rounded"
      ></textarea>
    </div>

    <!-- Image -->
    <div>
      <label class="block mb-1 font-medium">صورة المقال</label>
      <input
        type="text"
        placeholder="Image URL"
        class="w-full border p-2 rounded"
      />
    </div>

    <div>
      <label class="block mb-1 font-medium">وقت القراءة</label>
      <input
        type="text"
        placeholder="Read Time (e.g. 5 min)"
        class="w-full border p-2 rounded"
      />
    </div>

    <div>
      <label class="block mb-1 font-medium">المحتوى</label>
      <textarea
        placeholder="Content"
        rows="6"
      class="w-full border p-2 rounded"
    ></textarea>
    </div>

    <button
      type="submit"
      class="bg-primary text-white px-4 py-2 rounded"
    >
      إرسال
    </button>

  </form>
</section>
