<div class="mt-7">
  <div class="hero">
    <div class="flex flex-col gap-2">
      <span

      >
       محتوى جديد كل أسبوع
      </span>
      <h1 class="text-3xl md:text-5xl font-bold mb-4">

      </h1>
      <p class="text-lg text-gray-600 mb-8 max-w-xl">

        React و CSS، بأسلوب مبسط وموجه للمطور العربي.
      </p>
      <div class="flex gap-3 mb-10">
        <button
          class="flex gap-2 bg-primary text-white font-bold text-sm px-5 py-2.5 rounded-xl hover:bg-primary/80 transition-all"

          📖 ابدأ القراءة
        </button>
        <button
          class="text-sm text-gray-500 border border-gray-200 px-5 py-2.5 rounded-xl hover:bg-gray-50 transition-all"

          تعرف علينا
        </button>
      </div>
      <div class="flex gap-8">
        <div class="text-center">
          <p class="text-2xl font-bold text-gray-900">١٢+</p>
          <p class="text-xs text-gray-400 mt-0.5">مقال منشور</p>
        </div>
        <div class="w-px h-9 bg-gray-200"></div>
        <div class="text-center">
          <p class="text-2xl font-bold text-gray-900">{{articlesNumber}}</p>
          <p class="text-xs text-gray-400 mt-0.5">تصنيفات</p>
        </div>
        <div class="w-px h-9 bg-gray-200"></div>
        <div class="text-center">
          <p class="text-2xl font-bold text-gray-900">٥٠٠+</p>
          <p class="text-xs text-gray-400 mt-0.5">قارئ شهرياً</p>
        </div>
      </div>

    <div class="hero-image">
      <img src="./assets/images/hero.png" alt="Hero Image" />

  <app-featured-card />
